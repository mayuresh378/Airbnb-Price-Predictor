{% extends "base.html" %}
{% set active_page = "login" %}

{% block title %}Sign In — Airbnb Price Predictor{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h2><i class="fas fa-sign-in-alt" style="color:var(--primary);"></i> Welcome Back</h2>

    <form method="POST" action="{{url_for('login')}}">
      <div class="form-group">
        <label class="form-label"><i class="fas fa-user"></i> Username</label>
        <input type="text" name="username" class="form-input" required placeholder="Enter your username" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> Password</label>
        <input type="password" name="password" class="form-input" required placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div class="auth-divider"><span>or continue with</span></div>

    <a href="{{url_for('google_login')}}" class="btn-google">
      <i class="fab fa-google"></i> Sign in with Google
    </a>

    <p class="auth-footer">
      Don't have an account? <a href="{{url_for('register')}}">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
