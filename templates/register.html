{% extends "base.html" %}
{% set active_page = "register" %}

{% block title %}Create Account — Airbnb Price Predictor{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h2><i class="fas fa-user-plus" style="color:var(--primary);"></i> Create Account</h2>

    <form method="POST" action="{{url_for('register')}}">
      <div class="form-group">
        <label class="form-label"><i class="fas fa-user"></i> Username</label>
        <input type="text" name="username" class="form-input" required placeholder="Choose a username" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
        <input type="email" name="email" class="form-input" required placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> Password</label>
        <input type="password" name="password" class="form-input" required placeholder="Min 6 characters" minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="auth-divider"><span>or sign up with</span></div>

    <a href="{{url_for('google_login')}}" class="btn-google">
      <i class="fab fa-google"></i> Sign up with Google
    </a>

    <p class="auth-footer">
      Already have an account? <a href="{{url_for('login')}}">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
